<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17383a">
  <meta name="description" content="Restablece tu contraseña de Taskora Pet.">
  <title>Taskora Pet · Restablecer contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Epilogue:wght@500;600;700&amp;family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="reset">
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<main class="auth-layout" aria-label="Restablecer contraseña">
  <section class="brand-panel">
    <div class="brand-lockup brand-lockup-light"><span class="brand-symbol material-symbols-rounded" aria-hidden="true">pets</span><span>Taskora <small>PET CARE</small></span></div>
    <div class="brand-message"><span class="eyebrow eyebrow-light">RECUPERA TU ACCESO</span><h1>Una contraseña<br><em>nueva y segura.</em></h1><p>Define tu nueva contraseña para volver a la rutina de tus mascotas.</p></div>
  </section>
  <section class="auth-panel">
    <div class="auth-card">
      <div class="auth-intro"><span class="eyebrow">SEGURIDAD</span><h2>Restablecer contraseña</h2><p id="auth-helper">Escribe tu nueva contraseña. El enlace es de un solo uso.</p></div>
      <form id="reset-form" class="auth-form">
        <label>Nueva contraseña<span class="input-wrap"><span class="material-symbols-rounded" aria-hidden="true">lock</span><input name="newPassword" type="password" autocomplete="new-password" required minlength="8" placeholder="Mínimo 8 caracteres"></span></label>
        <label>Confirmar contraseña<span class="input-wrap"><span class="material-symbols-rounded" aria-hidden="true">lock_reset</span><input name="confirmPassword" type="password" autocomplete="new-password" required minlength="8" placeholder="Repite la contraseña"></span></label>
        <button class="primary-btn full-btn" type="submit"><span>Guardar contraseña</span><span class="material-symbols-rounded" aria-hidden="true">check</span></button>
        <a class="text-link" href="/index.html">Volver a iniciar sesión</a>
      </form>
    </div>
  </section>
</main>
<script>
  const $ = (selector) => document.querySelector(selector);
  let toastTimer;
  function showToast(message) {
    const toast = $('#toast');
    window.clearTimeout(toastTimer);
    toast.textContent = message;
    toast.classList.add('show');
    toastTimer = window.setTimeout(() => toast.classList.remove('show'), 3200);
  }
  const token = new URLSearchParams(window.location.search).get('token') || '';
  if (!token) {
    $('#auth-helper').textContent = 'El enlace no es válido. Solicita uno nuevo desde la página de acceso.';
    $('#reset-form').querySelector('button[type="submit"]').disabled = true;
  }
  $('#reset-form').onsubmit = async (event) => {
    event.preventDefault();
    const newPassword = event.target.elements.newPassword.value;
    const confirmPassword = event.target.elements.confirmPassword.value;
    if (newPassword !== confirmPassword) return showToast('Las contraseñas no coinciden.');
    try {
      const response = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || 'No fue posible restablecer la contraseña.');
      showToast(data.message || 'Contraseña actualizada.');
      window.setTimeout(() => window.location.replace('/index.html'), 1800);
    } catch (error) { showToast(error.message); }
  };
</script>
</body>
</html>
